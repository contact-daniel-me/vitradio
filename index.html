    <style>
      @keyframes pulse-logo {
        0% { opacity: 0.7; transform: scale(0.95); }
        50% { opacity: 1; transform: scale(1.05); }
        100% { opacity: 0.7; transform: scale(0.95); }
      }
      .loading-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
        background-color: #ffffff; /* Or transparent depending on the theme */
      }
      .loading-logo {
        width: 150px;
        height: auto;
        animation: pulse-logo 2s infinite ease-in-out;
      }
    </style>
    <div id="root">
      <div class="loading-container">
        <img src="/src/assets/VCR_logo.png" alt="Loading..." class="loading-logo" />
